name: CI/CD 파이프라인 (eng-voca-quiz)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 20.19.0 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'

      - name: npm 의존성 설치
        run: npm install

      - name: NestJS 빌드
        run: npm run build

      - name: 도커 이미지 빌드
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/eng-voca-quiz .

      - name: 도커 허브 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 도커 허브에 이미지 푸시
        run: docker push ${{ secrets.DOCKER_USERNAME }}/eng-voca-quiz

      - name: 원격서버에 배포
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.REMOTE_PORT }}
          script: |
            cd ${{ secrets.REMOTE_PROJECT_PATH }}
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            echo "${{secrets.ENV_FILE}}" > ./.env
            docker compose down
            docker rmi ${{ secrets.DOCKER_USERNAME }}/eng-voca-quiz
            docker pull ${{ secrets.DOCKER_USERNAME }}/eng-voca-quiz
            docker compose up -d --remove-orphans
            cd /home/gyubuntu/nginx-proxy
            docker compose down
            docker compose up -d

      - name: 성공 메세지 출력
        if: success()
        run: echo "🎉 CI/CD 파이프라인 성공"
